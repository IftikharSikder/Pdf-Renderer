name: flutter_boilerplate
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  intl: ^0.20.2
  connectivity_plus: ^6.1.5
  http: ^1.5.0
  http_parser: ^4.1.2
  shared_preferences: ^2.5.3
  path: ^1.9.1
  file_picker: ^10.3.2
  get_it: ^8.2.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  go_router: ^16.2.0
  app_links: ^6.4.1
  provider: ^6.1.5+1
  shimmer_animation: ^2.2.2
  flutter_native_splash: ^2.4.6
  cached_network_image: ^3.4.1
  easy_localization: ^3.0.8
  skeletonizer: ^2.1.0+1
  flutter_svg: ^2.2.0
  dotted_line: ^3.2.3



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  #freezed package
  freezed: ^3.2.0
  json_serializable: ^6.10.0
  build_runner: ^2.7.0


flutter:

  uses-material-design: true


  assets:
    - assets/images/
    - assets/images/svg/
    - assets/images/will_be_removed/
    - assets/translations/


  fonts:
    - family: Ubuntu
      fonts:
        - asset: assets/fonts/Ubuntu-Light.ttf
          weight: 300
        - asset: assets/fonts/Ubuntu-Regular.ttf
          weight: 400
        - asset: assets/fonts/Ubuntu-Medium.ttf
          weight: 500
        - asset: assets/fonts/Ubuntu-Bold.ttf
          weight: 700

    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter_28pt-Bold.ttf
          weight: 700

    - family: SFProRounded
      fonts:
        - asset: assets/fonts/sf_pro_rounded/SF-Pro-Rounded-Black.otf
          weight: 900
        - asset: assets/fonts/sf_pro_rounded/SF-Pro-Rounded-Heavy.otf
          weight: 800
        - asset: assets/fonts/sf_pro_rounded/SF-Pro-Rounded-Bold.otf
          weight: 700
        - asset: assets/fonts/sf_pro_rounded/SF-Pro-Rounded-Semibold.otf
          weight: 600
        - asset: assets/fonts/sf_pro_rounded/SF-Pro-Rounded-Medium.otf
          weight: 500
        - asset: assets/fonts/sf_pro_rounded/SF-Pro-Rounded-Regular.otf
          weight: 400
        - asset: assets/fonts/sf_pro_rounded/SF-Pro-Rounded-Light.otf
          weight: 300
        - asset: assets/fonts/sf_pro_rounded/SF-Pro-Rounded-Thin.otf
          weight: 200
        - asset: assets/fonts/sf_pro_rounded/SF-Pro-Rounded-Ultralight.otf
          weight: 100